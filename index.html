<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayantha Textile | Saree Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Portfolio style එකට ගැලපෙන CSS */
        :root {
            --primary: #800020; /* Maroon */
            --accent: #b76e79;  /* Rose Gold */
            --bg: #ffffff;
            --text: #333;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        /* Navigation */
        nav { 
            background: white; padding: 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--primary); font-weight: bold; }

        /* Hero Section - මේක තමයි සයිට් එක ලස්සන කරන්නේ */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1610030469618-d08914619946?w=1200') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0; }
        .hero p { font-size: 1.2rem; opacity: 0.9; margin: 20px 0; }

        /* Product Grid */
        .container { max-width: 1200px; margin: 50px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .card { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.4s; border: 1px solid #eee;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 45px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 400px; object-fit: cover; }
        
        .content { padding: 25px; text-align: center; }
        .price { color: var(--primary); font-size: 1.5rem; font-weight: 600; margin: 10px 0; }

        .btn-whatsapp {
            display: inline-block; background: #25d366; color: white; padding: 12px 25px; 
            border-radius: 50px; text-decoration: none; font-weight: 600; transition: 0.3s;
        }
        .btn-whatsapp:hover { background: #128c7e; transform: scale(1.05); }

        @media (max-width: 768px) { .hero h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Jayantha Textile</div>
    </nav>

    <div class="hero">
        <h1>Elegant Saree Collection</h1>
        <p>අලංකාරවත් සාරි විලාසිතා දැන් එකම තැනකින්</p>
    </div>

    <div class="container">
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1610189012906-4f4e5e9b2e2a?w=600" alt="Saree">
                <div class="content">
                    <h3>Soft Silk Saree</h3>
                    <div class="price">Rs. 4,500</div>
                    <a href="https://wa.me/947XXXXXXXX" class="btn-whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp Order</a>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?w=600" alt="Saree">
                <div class="content">
                    <h3>Designer Party Saree</h3>
                    <div class="price">Rs. 6,800</div>
                    <a href="https://wa.me/947XXXXXXXX" class="btn-whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp Order</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
